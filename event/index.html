<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event</title>
  <style>
    #event {
      margin: 20px;
      padding: 10px;
      height: 100px;
      background-color: green;
    }
    #click {
      margin: 5px;
      height: 20px;
      background-color: aquamarine;
    }

  </style>
  <script type="module">
    const event2 = document.getElementById("event");
    const click = document.getElementById("click");
    click.onclick = function() {
      return false;
    }
    event2.addEventListener("click", (e) => {
      console.log('Event capture', e);
      // e.stopImmediatePropagation();
      // e.stopPropagation();
    }, true);

     click.addEventListener("click", (e) => {
      console.log("click capture");
      // e.stopPropagation();
      e.stopImmediatePropagation();
    }, true);

    click.addEventListener("click", (e) => {
      console.log("click");
    });
    event2.addEventListener('click', () => {
      console.log('event bubble');
    })
  </script>
</head>
<body>
  <div id="event">
    <div id="click">Click</div>
  </div>
</body>
</html>
