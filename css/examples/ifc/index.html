<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFC</title>
  <style>
    strong {
      margin: 10px;
      border: 4px solid seagreen;
      padding: 6px;
      /* 
      inline元素width,height不起作用,在垂直方向的边距不起作用
      应用垂直填充和边框可能会在内容的上方和下方重叠，因为在内联格式上下文中，填充和边框不会将行框撑开。
      */
      
    }
  </style>
</head>
<body>
  <p>我是一个有<strong>原则</strong>的人</p>
</body>
</html>
