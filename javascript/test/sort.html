<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.4/jquery.js"></script>
    </head>
    <body>
        <button class='up'>销量升序</button>
        <button class='down'>销量降序</button>
        <ul></ul>

        <script>
            var cups = [
                { type: 1, price: 100, color: 'black', sales: 3000, name: '牛客logo马克杯' },
                { type: 2, price: 40, color: 'blue', sales: 1000, name: '无盖星空杯' },
                { type: 4, price: 60, color: 'green', sales: 200, name: '老式茶杯' },
                { type: 3, price: 50, color: 'green', sales: 600, name: '欧式印花杯' }
            ]
            var ul = document.querySelector('ul');
            var upbtn = document.querySelector('.up');
            var downbtn = document.querySelector('.down');
            function sortCups(direction){
                return function(){
                   return cups.sort((a,b) => direction == 'up'? a.sales - b.sales: b.sales - a.sales); 
                }
            }
            
            // 补全代码
            $(function(){
                $(upbtn).on('click', function() {
                    let list = sortCups('up')().map(({ name}) => `<li>${name}</li>`);
                    $(ul).html(list);
                });
                
                 $(downbtn).on('click', function() {
                    let list = sortCups('down')().map(({ name}) => `<li>${name}</li>`);
                    $(ul).html(list);
                })
            }())
        </script>
    </body>
</html>
