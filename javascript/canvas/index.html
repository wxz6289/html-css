  <canvas width="1200" height="800"></canvas>
<script>
    /*1.构造函数*/
    var LineChart = function (ctx) {
        this.ctx = ctx || document.querySelector('canvas').getContext('2d');
        /*画布的大小*/
        this.canvasWidth = this.ctx.canvas.width;
        this.canvasHeight = this.ctx.canvas.height;
        // /*网格的大小*/
        // this.gridSize = 10;
        /*坐标系的间距*/
        this.space = 10;
        /*坐标原点*/
        this.x0 = this.space;
        this.y0 = this.canvasHeight - this.space;
        /*箭头的大小*/
        this.arrowSize = 5;
        /*绘制点*/
        this.dottedSize = 2;
        /*点的坐标 和数据有关系  数据可视化*/
    }
    /*2.行为方法*/
    LineChart.prototype.init = function (data) {
        this.drawGrid();
        this.drawAxis(data);
        this.drawDotted(data);
    };
    /*绘制网格*/
    LineChart.prototype.drawGrid = function () {
        /*x方向的线*/
        var xLineTotal = Math.floor(this.canvasHeight / this.gridSize);
        this.ctx.strokeStyle = '#eee';
        for (var i = 0; i <= xLineTotal; i++) {
            this.ctx.beginPath();
            this.ctx.moveTo(0, i * this.gridSize - 0.5);
            this.ctx.lineTo(this.canvasWidth, i * this.gridSize - 0.5);
            this.ctx.stroke();
        }
        /*y方向的线*/
        var yLineTotal = Math.floor(this.canvasWidth / this.gridSize);
        for (var i = 0; i <= yLineTotal; i++) {
            this.ctx.beginPath();
            this.ctx.moveTo(i * this.gridSize - 0.5, 0);
            this.ctx.lineTo(i * this.gridSize - 0.5, this.canvasHeight);
            this.ctx.stroke();
        }
    };
    /*绘制坐标系*/
    LineChart.prototype.drawAxis = function (data) {
      let y = [0, '50k', '100k', '150k']
      for(let i =0; i < y.length; i++) {
        const ytext = y[i]
        const yCSpiltVal = this.canvasHeight / (y.length - 1)
        // 绘画文本标签
        this.ctx.fillText(ytext, 0 , yCSpiltVal * (y.length- 1 - i) + this.space);
      }
      for(let i =0; i < data.length; i++) {
        const xtext = data[i].x
        const xtextWidth = this.ctx.measureText(xtext).width; // 获取文字的长度
        const xCSpiltVal = this.canvasWidth / (data.length)
        console.log(xCSpiltVal * i , xtext)
        // 绘画文本标签
        this.ctx.fillText(xtext, xCSpiltVal * i + this.space - xtextWidth / 2 , 800);
      }
        /*X轴*/
        this.ctx.beginPath();
        this.ctx.strokeStyle = '#000';
        this.ctx.moveTo(this.x0, this.y0);
        this.ctx.lineTo(this.canvasWidth - this.space, this.y0);
        this.ctx.lineTo(this.canvasWidth - this.space - this.arrowSize, this.y0 + this.arrowSize / 2);
        this.ctx.lineTo(this.canvasWidth - this.space - this.arrowSize, this.y0 - this.arrowSize / 2);
        this.ctx.lineTo(this.canvasWidth - this.space, this.y0);
        this.ctx.stroke();
        this.ctx.fill();
        /*Y轴*/
        this.ctx.beginPath();
        this.ctx.strokeStyle = '#000';
        this.ctx.moveTo(this.x0, this.y0);
        this.ctx.lineTo(this.space, this.space);
        this.ctx.lineTo(this.space + this.arrowSize / 2, this.space + this.arrowSize);
        this.ctx.lineTo(this.space - this.arrowSize / 2, this.space + this.arrowSize);
        this.ctx.lineTo(this.space, this.space);
        this.ctx.stroke();
        this.ctx.fill();
    };
    /*绘制所有点*/
    LineChart.prototype.drawDotted = function (data) {
      /*1.数据的坐标 需要转换 canvas坐标*/
      /*2.再进行点的绘制*/
      /*3.把线连起来*/
      /*记录当前坐标*/
      var prevCanvasX = 0;
      var prevCanvasY = 0;
      var space = 0
      for(let i = 0; i < data.length; i++) {
        let startYear = data[0].x.split("-")[0]
        if(data[i].x.split("-")[0] > startYear) {
          space = (data[i].x.split("-")[0] - startYear) * 10 + parseInt(data[i].x.split('-')[1]) + 1
        }else {
          space = parseInt(data[i].x.split('-')[1])
        }
        // console.log(space)
          /* x = 原点的坐标 + 数据的坐标 */
          /* y = 原点的坐标 - 数据的坐标 */
          var canvasX = this.x0 + space * 50;
          var canvasY = this.y0 - data[i].y / 200;
          /*绘制点*/
          this.ctx.beginPath();
          this.ctx.moveTo(canvasX - this.dottedSize / 2, canvasY - this.dottedSize / 2);
          this.ctx.lineTo(canvasX + this.dottedSize / 2, canvasY - this.dottedSize / 2);
          this.ctx.lineTo(canvasX + this.dottedSize / 2, canvasY + this.dottedSize / 2);
          this.ctx.lineTo(canvasX - this.dottedSize / 2, canvasY + this.dottedSize / 2);
          this.ctx.closePath();
          this.ctx.fill();
          this.ctx.strokeStyle = "blue";
          /*点的连线*/
          /*当时第一个点的时候 起点是 x0 y0*/
          /*当时不是第一个点的时候 起点是 上一个点*/
          if(i == 0){
            // this.ctx.beginPath();
            // this.ctx.moveTo(this.x0,this.y0);
            // this.ctx.lineTo(canvasX,canvasY);
            // this.ctx.stroke();
          }else{
            /*上一个点*/
            this.ctx.beginPath();
            this.ctx.moveTo(prevCanvasX,prevCanvasY);
            this.ctx.lineTo(canvasX,canvasY);
            this.ctx.stroke();
          }
           // 绘制文本标签
           const textWidth = this.ctx.measureText(data[i].y).width; // 获取文字的长度
          this.ctx.fillText(data[i].y, canvasX - textWidth / 2, canvasY - 10); // 文字
          /*记录当前的坐标，下一次要用*/
          prevCanvasX = canvasX;
          prevCanvasY = canvasY;
      }
    }
