<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas 饼图</title>
</head>
<body>
  <canvas id="pie-chart" width="1200" height="400"></canvas>
  <script type="module">
    import { PieChart } from './pie-chart.js';
    import { pieChartData, pieChartColors } from './pie-chart-data.js';

    const chart = new PieChart(document.getElementById('pie-chart'), {
      colors: pieChartColors,
    });

    const redraw = (event) => {
      const pointer = event
        ? { x: event.offsetX, y: event.offsetY }
        : null;
      chart.render(pieChartData, pointer);
    };

    chart.render(pieChartData);

    chart.canvas.addEventListener('mousemove', redraw);
    chart.canvas.addEventListener('click', redraw);
  </script>
</body>
</html>
