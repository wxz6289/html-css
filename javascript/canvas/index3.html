    #img-wrapper{
      display: grid;
      grid-template-columns: repeat(auto-fill, 256px);
      align-items: center;
      justify-content: space-between;
    }
    #img-wrapper .item {
      background-repeat: no-repeat;
      background-size: 100% 100%;
      width: 100%;
      height: 172px;
      margin: 10px auto;
      border-radius: 10px;
      background-color: #f3f3f3;
    }
    #img-wrapper .item img {
      width: 100%;
      height: 100%;
    }
    .icon-color {
      color: #fff;
      margin: 0 5px;
    }
    #img-wrapper .item .model {
      position: relative;
      background-color: rgba(0,0,0, 0.7);
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      opacity: 0;
      border-radius: 10px;
    }
    #img-wrapper .item .model:hover {
      opacity: 1;
    }
    #img-wrapper .item .btn {
      position: absolute;
      width: 80px;
      height: 30px;
      background: rgb(39, 149, 233);
      border-radius: 5px;
      color: #fff;
      border: none;
      left: 50%;
      top: 40%;
      transform: translate(-50%, -50%);
    }
    #img-wrapper .item .icon-wrapper {
      position: absolute;
      left: 50%;
      top: 60%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
