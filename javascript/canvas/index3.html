<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./fonts/iconfont.css">
  <title>图表类型卡片</title>
  <style>
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, 256px);
      justify-content: center;
      gap: 10px;
    }

    .gallery__card {
      height: 172px;
      border-radius: 10px;
      background: #f3f3f3 center / 100% 100% no-repeat;
    }

    .gallery__overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: rgba(0, 0, 0, 0.7);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .gallery__card:hover .gallery__overlay {
      opacity: 1;
    }

    .gallery__btn {
      width: 80px;
      height: 30px;
      border: none;
      border-radius: 5px;
      background: #0d47a1;
      color: #ffffff;
      cursor: pointer;
    }

    .gallery__icons {
      color: #fff;
    }

    .gallery__icons .iconfont + .iconfont {
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <div class="gallery" id="gallery" aria-label="图表类型列表"></div>
  <script type="module">
    import { chartImages, overlayIcons } from './gallery-data.js';

    const gallery = document.getElementById('gallery');

    for (const file of chartImages) {
      const card = document.createElement('article');
      card.className = 'gallery__card';
      card.style.backgroundImage = `url('./img/${file}')`;

      const icons = overlayIcons
        .map((name) => `<span class="iconfont ${name}" aria-hidden="true"></span>`)
        .join('');

      card.innerHTML = `
        <div class="gallery__overlay">
          <button type="button" class="gallery__btn">编辑</button>
          <div class="gallery__icons">${icons}</div>
        </div>
      `;

      gallery.append(card);
    }
  </script>
</body>
</html>
